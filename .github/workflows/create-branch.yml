name: Create Lakebase Autoscaling Branch

on:
  create:

jobs:
  create-branch:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      PROJECT_NAME: ${{ vars.LAKEBASE_PROJECT_NAME }}

    steps:
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Format branch name
        id: branch
        run: |
          SANITIZED=$(echo "${{ github.event.ref }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-63)
          echo "name=$SANITIZED" >> "$GITHUB_OUTPUT"

      - name: Create Lakebase branch
        run: |
          databricks postgres create-branch \
            "projects/$PROJECT_NAME" \
            "${{ steps.branch.outputs.name }}" \
            --json '{
              "spec": {
                "source_branch": "projects/'"$PROJECT_NAME"'/branches/production",
                "ttl": "604800s"
              }
            }'

      - name: Create read-write endpoint
        run: |
          databricks postgres create-endpoint \
            "projects/$PROJECT_NAME/branches/${{ steps.branch.outputs.name }}" \
            primary \
            --json '{
              "spec": {
                "endpoint_type": "ENDPOINT_TYPE_READ_WRITE",
                "autoscaling_limit_min_cu": 0.5,
                "autoscaling_limit_max_cu": 2.0
              }
            }'
