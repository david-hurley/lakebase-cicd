name: Deploy Lakebase Autoscaling Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy Lakebase project
        run: databricks bundle deploy --var="project_id=${{ secrets.LAKEBASE_INSTANCE_NAME }}"

      - name: Run post-deploy
        run: bash resources/post_deploy.sh
        env:
          PROJECT_ID: ${{ secrets.LAKEBASE_INSTANCE_NAME }}
