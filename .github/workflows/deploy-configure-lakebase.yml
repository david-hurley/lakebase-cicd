# ---------------------------------------------------------------------------
# Deploy & Configure Lakebase Autoscaling Project
#
# Triggered on every push to main.  Two sequential jobs:
#   1. deploy  — runs `databricks bundle deploy` to create / update the
#                Lakebase project and its production read-replica endpoint.
#   2. configure — sets permissions, protects the production branch,
#                  creates the database, and runs schema migrations.
#
# Secrets / variables required:
#   secrets.DATABRICKS_HOST     — workspace URL
#   secrets.DATABRICKS_TOKEN    — PAT or OAuth token
#   vars.LAKEBASE_PROJECT_NAME  — project name (e.g. "my-app")
# ---------------------------------------------------------------------------

name: Deploy Lakebase Autoscaling Project

on:
  push:
    branches:
      - main

jobs:
  deploy-lakebase-autoscaling-instance:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      PROJECT_NAME: ${{ vars.LAKEBASE_PROJECT_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy Lakebase project
        run: databricks bundle deploy --var="project_name=${{ env.PROJECT_NAME }}"

  configure-lakebase-autoscaling-instance:
    needs: deploy-lakebase-autoscaling-instance
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      PROJECT_NAME: ${{ vars.LAKEBASE_PROJECT_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run post-deploy
        run: bash scripts/post_deploy.sh "${{ env.PROJECT_NAME }}"
