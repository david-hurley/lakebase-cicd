# ---------------------------------------------------------------------------
# Delete Lakebase Branch
#
# Triggered whenever a Git branch is deleted.  Removes the corresponding
# Lakebase dev branch (and its endpoints) so resources are cleaned up
# automatically when a feature branch is merged or abandoned.
# ---------------------------------------------------------------------------

name: Delete Lakebase Autoscaling Branch

on:
  delete:

jobs:
  delete-lakebase-autoscaling-branch:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      PROJECT_NAME: ${{ vars.LAKEBASE_PROJECT_NAME }}

    steps:
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Format branch name
        id: branch
        run: |
          SANITIZED=$(echo "${{ github.event.ref }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-63)
          echo "name=$SANITIZED" >> "$GITHUB_OUTPUT"

      - name: Delete Lakebase branch
        run: |
          databricks postgres delete-branch \
            "projects/$PROJECT_NAME/branches/${{ steps.branch.outputs.name }}"
